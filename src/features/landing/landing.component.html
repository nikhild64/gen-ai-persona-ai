<section class="hero">
  <h1>{{ heroTitle }}</h1>
  <p class="sub">{{ heroSubheader }}</p>
</section>

@for (group of groups; track group.title) {
<section class="category" [attr.aria-label]="group.title">
  <h2 class="category-title">{{ group.title }}</h2>
  <div class="cards">
    @for (p of group.personas; track p) {
    <app-persona-card [persona]="p" />
    }
  </div>
</section>
}

@if (askBothEnabled) {
<section class="ask-both-section" aria-label="Ask Both blended mode">
  <app-ask-both-card />
</section>
}

<section class="disclaimer-band" role="note">
  <p>{{ disclaimerBand }}</p>
</section>
