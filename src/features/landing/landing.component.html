<section class="hero">

  <h1>{{ heroTitle }}</h1>

  <p class="sub">{{ heroSubheader }}</p>

</section>



<section class="persona-grid" aria-label="Choose an advisor">

  @for (p of personas; track p) {

  <app-persona-card [persona]="p" />

  }



  @for (cp of customPersonas(); track cp.id) {

  <app-custom-persona-card

    [persona]="cp"

    (deleteRequested)="onDeleteCustomPersona($event)"

  />

  }



  @if (customPersonaEnabled) {

  <app-create-persona-card (createRequested)="openCreateDialog()" />

  }



  @if (askBothEnabled) {

  <app-ask-both-card (blendRequested)="openPicker()" />

  }

</section>



<app-create-persona-dialog [(open)]="createDialogOpen" />



<app-persona-picker-dialog

  [(open)]="pickerOpen"

  mode="unified"

  [initialPair]="{ a: blendedPair.personaA(), b: blendedPair.personaB() }"

  (personaPicked)="onPersonaPicked($event)"

  (pairConfirmed)="onBlendPairConfirmed($event)"

/>



<section class="disclaimer-band" role="note">

  <p>{{ disclaimerBand }}</p>

</section>
