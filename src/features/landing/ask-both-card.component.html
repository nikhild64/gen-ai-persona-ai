<button
  type="button"
  class="ask-both-card"
  data-mode="ask-both"
  aria-label="Blend — pick any two advisors"
  (click)="blendRequested.emit()"
>
  <div class="icon-stack" aria-hidden="true">
    <span class="plus">+</span>
  </div>
  <div class="body">
    <h2>Blend</h2>
    <p class="tagline">
      Pick any two advisors — one fused answer blending both voices per turn.
    </p>
  </div>
  <span class="cta">Blend a pair</span>
</button>
